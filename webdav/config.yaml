name: WebDAV
description: WebDAV server based on rclone with SSL/TLS support
url: https://github.com/slother/hassio-addons/tree/main/webdav
version: 1.1.1
stage: stable
slug: webdav
image: ghcr.io/slother/{arch}-addon-webdav
codenotary: notary@home-assistant.io
startup: services
init: false
boot: auto
hassio_role: default
hassio_api: true
ports:
  8080/tcp: 8080
  5572/tcp: 5572
ports_description:
  8080/tcp: WebDAV
  5572/tcp: Prometheus metrics
arch:
  - aarch64
  - amd64
map:
  - addon_config:rw
  - all_addon_configs:rw
  - homeassistant_config:rw
  - addons:rw
  - backup:rw
  - media:rw
  - share:rw
  - ssl:ro
options:
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  metrics: false
  document_root: /share/webdav
  logins:
    - username: dummyUser
      password: null
schema:
  ssl: bool
  certfile: str
  keyfile: str
  metrics: bool
  document_root: str
  logins:
    - username: str
      password: password
